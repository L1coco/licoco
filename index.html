<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Licoco 漫画小站</title>
  <style>
    :root {
      --bg: #eef8ff;
      --bg-2: #dff1ff;
      --card: rgba(255, 255, 255, 0.86);
      --primary: #55aeea;
      --primary-dark: #2e8fd0;
      --text: #24445c;
      --muted: #6f8da3;
      --line: #bfe2f7;
      --shadow: 0 18px 50px rgba(72, 156, 215, 0.18);
      --danger: #ff6b8a;
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0, transparent 28rem),
        radial-gradient(circle at top right, #c8ecff 0, transparent 24rem),
        linear-gradient(180deg, var(--bg) 0%, #f7fcff 100%);
      min-height: 100vh;
    }

    header {
      padding: 44px 20px 22px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 8px 28px rgba(85, 174, 234, 0.12);
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(34px, 7vw, 68px);
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 650px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto 72px;
    }

    .panel {
      border: 1px solid rgba(191, 226, 247, 0.9);
      background: var(--card);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
    }

    .upload-area {
      padding: 28px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      align-items: stretch;
    }

    .dropzone {
      border: 2px dashed #8ecdf3;
      border-radius: 22px;
      background: linear-gradient(180deg, #f7fcff 0%, #e8f7ff 100%);
      min-height: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .dropzone:hover,
    .dropzone.dragover {
      transform: translateY(-2px);
      border-color: var(--primary);
      background: #f9fdff;
      box-shadow: inset 0 0 0 999px rgba(85, 174, 234, 0.04);
    }

    .upload-icon {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border-radius: 26px;
      background: linear-gradient(135deg, #b7e5ff, #f4fbff);
      margin-bottom: 16px;
      font-size: 36px;
      box-shadow: 0 14px 34px rgba(85, 174, 234, 0.22);
    }

    .dropzone strong {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .dropzone span {
      color: var(--muted);
      line-height: 1.6;
    }

    input[type="file"] {
      display: none;
    }

    .side-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      background: linear-gradient(180deg, #ffffff, #edf8ff);
      border-radius: 22px;
      border: 1px solid #d8effc;
    }

    .side-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .side-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
      font-size: 14px;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 24px rgba(85, 174, 234, 0.28);
    }

    .btn-ghost {
      color: var(--primary-dark);
      background: #e8f6ff;
      border: 1px solid #c9e8fb;
    }

    .btn-danger {
      color: white;
      background: var(--danger);
      box-shadow: 0 10px 24px rgba(255, 107, 138, 0.22);
    }

    .toolbar {
      margin: 28px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 26px;
    }

    .search {
      min-width: min(100%, 320px);
      padding: 13px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.92);
      font-size: 15px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
    }

    .comic-card {
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255,255,255,0.9);
      border: 1px solid #d7eefc;
      box-shadow: 0 12px 36px rgba(72,156,215,0.12);
      transition: 0.2s ease;
      position: relative;
    }

    .comic-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 50px rgba(72,156,215,0.2);
    }

    .comic-thumb {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      background: #eaf7ff;
      cursor: zoom-in;
    }

    .comic-info {
      padding: 14px;
    }

    .comic-title {
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .comic-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      padding: 0 12px 12px;
    }

    .mini-btn {
      padding: 8px 12px;
      font-size: 12px;
    }

    .empty {
      padding: 54px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.55);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 18px;
      border-radius: 999px;
      background: #24445c;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      box-shadow: 0 14px 40px rgba(36,68,92,0.25);
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(20, 48, 70, 0.72);
      z-index: 20;
    }

    .modal.show { display: flex; }

    .modal-content {
      position: relative;
      width: min(96vw, 980px);
      max-height: 92vh;
      border-radius: 24px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.32);
    }

    .modal img {
      width: 100%;
      max-height: calc(92vh - 28px);
      object-fit: contain;
      display: block;
      border-radius: 16px;
      background: #f4fbff;
    }

    .close {
      position: absolute;
      right: 14px;
      top: 14px;
      background: rgba(36, 68, 92, 0.86);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-weight: 900;
      z-index: 2;
    }

    footer {
      text-align: center;
      color: var(--muted);
      padding: 20px;
      font-size: 14px;
    }

    @media (max-width: 820px) {
      header { padding-top: 32px; }
      .upload-area { grid-template-columns: 1fr; padding: 18px; }
      .dropzone { min-height: 220px; }
      .comic-thumb { height: 210px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="badge">☁️ 淡蓝漫画站 · 本地上传预览版</div>
    <h1>Licoco Comic Gallery</h1>
    <p class="subtitle">
      上传你的漫画图片，网页会自动生成预览卡片。点击图片可以放大查看，适合先部署到 GitHub Pages 做个人漫画小站。
    </p>
  </header>

  <main>
    <section class="panel upload-area">
      <label class="dropzone" id="dropzone" for="fileInput">
        <div class="upload-icon">🖼️</div>
        <strong>拖拽漫画图片到这里</strong>
        <span>也可以点击选择文件。支持 PNG / JPG / JPEG / WEBP / GIF，可以一次上传多张。</span>
        <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple />
      </label>

      <aside class="side-card">
        <div>
          <h2>上传说明</h2>
          <p>
            当前版本会把图片保存在你的浏览器里，所以刷新后还在。<br />
            但它不是云端上传，其他人不会看到你在本机新增的图片。
          </p>
        </div>
        <div class="actions">
          <button class="btn-primary" id="chooseBtn">选择图片</button>
          <button class="btn-ghost" id="exportBtn">导出数据</button>
          <button class="btn-danger" id="clearBtn">清空全部</button>
        </div>
      </aside>
    </section>

    <div class="toolbar">
      <h2>漫画预览 <span id="count">0</span></h2>
      <input class="search" id="searchInput" type="search" placeholder="搜索图片文件名…" />
    </div>

    <section id="gallery" class="gallery"></section>
    <section id="empty" class="empty">还没有上传图片。先丢几张漫画进来吧 ✨</section>
  </main>

  <footer>
    Made with soft blue pixels 💙 · 你可以把这个 index.html 上传到 GitHub Pages
  </footer>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="close" id="closeModal">×</div>
      <img id="modalImage" src="" alt="漫画大图预览" />
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const DB_NAME = "licoco-comic-gallery";
    const STORE_NAME = "images";
    const fileInput = document.getElementById("fileInput");
    const dropzone = document.getElementById("dropzone");
    const chooseBtn = document.getElementById("chooseBtn");
    const clearBtn = document.getElementById("clearBtn");
    const exportBtn = document.getElementById("exportBtn");
    const gallery = document.getElementById("gallery");
    const empty = document.getElementById("empty");
    const count = document.getElementById("count");
    const searchInput = document.getElementById("searchInput");
    const modal = document.getElementById("modal");
    const modalImage = document.getElementById("modalImage");
    const closeModal = document.getElementById("closeModal");
    const toast = document.getElementById("toast");

    let db;
    let images = [];

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function transaction(mode = "readonly") {
      return db.transaction(STORE_NAME, mode).objectStore(STORE_NAME);
    }

    function getAllImages() {
      return new Promise((resolve, reject) => {
        const request = transaction().getAll();
        request.onsuccess = () => resolve(request.result.sort((a, b) => b.createdAt - a.createdAt));
        request.onerror = () => reject(request.error);
      });
    }

    function saveImage(image) {
      return new Promise((resolve, reject) => {
        const request = transaction("readwrite").put(image);
        request.onsuccess = resolve;
        request.onerror = () => reject(request.error);
      });
    }

    function deleteImage(id) {
      return new Promise((resolve, reject) => {
        const request = transaction("readwrite").delete(id);
        request.onsuccess = resolve;
        request.onerror = () => reject(request.error);
      });
    }

    function clearImages() {
      return new Promise((resolve, reject) => {
        const request = transaction("readwrite").clear();
        request.onsuccess = resolve;
        request.onerror = () => reject(request.error);
      });
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }

    async function refresh() {
      images = await getAllImages();
      renderGallery();
    }

    function renderGallery() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = images.filter(img => img.name.toLowerCase().includes(keyword));
      count.textContent = `(${filtered.length})`;
      gallery.innerHTML = "";

      empty.style.display = filtered.length ? "none" : "block";
      gallery.style.display = filtered.length ? "grid" : "none";

      filtered.forEach(img => {
        const card = document.createElement("article");
        card.className = "comic-card";
        card.innerHTML = `
          <img class="comic-thumb" src="${img.dataUrl}" alt="${escapeHTML(img.name)}" />
          <div class="comic-info">
            <div class="comic-title" title="${escapeHTML(img.name)}">${escapeHTML(img.name)}</div>
            <div class="comic-meta">${formatSize(img.size)} · ${new Date(img.createdAt).toLocaleDateString()}</div>
          </div>
          <div class="card-actions">
            <button class="btn-danger mini-btn" data-id="${img.id}">删除</button>
          </div>
        `;

        card.querySelector("img").addEventListener("click", () => {
          modalImage.src = img.dataUrl;
          modal.classList.add("show");
        });

        card.querySelector("button").addEventListener("click", async () => {
          await deleteImage(img.id);
          showToast("已删除这张图片");
          await refresh();
        });

        gallery.appendChild(card);
      });
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      })[char]);
    }

    async function handleFiles(files) {
      const imageFiles = Array.from(files).filter(file => file.type.startsWith("image/"));
      if (!imageFiles.length) {
        showToast("请选择图片文件喔");
        return;
      }

      for (const file of imageFiles) {
        const dataUrl = await fileToDataURL(file);
        await saveImage({
          id: crypto.randomUUID(),
          name: file.name,
          type: file.type,
          size: file.size,
          dataUrl,
          createdAt: Date.now()
        });
      }

      fileInput.value = "";
      showToast(`上传完成：${imageFiles.length} 张图片`);
      await refresh();
    }

    chooseBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", e => handleFiles(e.target.files));
    searchInput.addEventListener("input", renderGallery);

    ["dragenter", "dragover"].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
      });
    });

    dropzone.addEventListener("drop", e => handleFiles(e.dataTransfer.files));

    clearBtn.addEventListener("click", async () => {
      if (!images.length) return showToast("现在还没有图片");
      const ok = confirm("确定要清空所有已上传的图片吗？这个操作不能撤销。");
      if (!ok) return;
      await clearImages();
      showToast("已经清空全部图片");
      await refresh();
    });

    exportBtn.addEventListener("click", () => {
      if (!images.length) return showToast("没有可导出的图片数据");
      const data = JSON.stringify(images, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "comic-gallery-backup.json";
      a.click();
      URL.revokeObjectURL(url);
      showToast("已导出备份文件");
    });

    closeModal.addEventListener("click", () => modal.classList.remove("show"));
    modal.addEventListener("click", e => {
      if (e.target === modal) modal.classList.remove("show");
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") modal.classList.remove("show");
    });

    (async function init() {
      db = await openDB();
      await refresh();
    })();
  </script>
</body>
</html>
