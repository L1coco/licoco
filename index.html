<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梨可可的漫画站</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #eef8ff;
      --bg-2: #dff2ff;
      --card: rgba(255, 255, 255, 0.82);
      --card-strong: rgba(255, 255, 255, 0.96);
      --text: #1f3a4d;
      --muted: #6a8aa0;
      --primary: #68bdf2;
      --primary-strong: #3499d8;
      --primary-dark: #2577ad;
      --danger: #ff748a;
      --danger-dark: #d94c65;
      --line: rgba(105, 181, 230, 0.28);
      --shadow: 0 18px 50px rgba(42, 122, 174, 0.16);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(154, 220, 255, 0.65), transparent 34rem),
        radial-gradient(circle at top right, rgba(215, 241, 255, 0.9), transparent 28rem),
        linear-gradient(135deg, #f7fcff 0%, var(--bg) 48%, #e5f5ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(99, 175, 225, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 175, 225, 0.08) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 70%);
    }

    a { color: inherit; }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 24px;
      align-items: stretch;
      margin-bottom: 24px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .intro {
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .intro::after {
      content: "☁";
      position: absolute;
      right: 28px;
      bottom: -20px;
      font-size: 118px;
      line-height: 1;
      color: rgba(104, 189, 242, 0.14);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(104, 189, 242, 0.17);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(104, 189, 242, 0.25);
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .stat {
      min-width: 130px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(104, 189, 242, 0.18);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: var(--primary-dark);
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .admin-box {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .admin-box h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .admin-tip {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input, button {
      font: inherit;
    }

    input[type="email"], input[type="password"], input[type="search"], input[type="text"] {
      width: 100%;
      border: 1px solid rgba(104, 189, 242, 0.3);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.78);
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(104, 189, 242, 0.16);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(52, 153, 216, 0.22);
      transition: 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); background: var(--primary-strong); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn.ghost {
      background: rgba(255,255,255,0.75);
      color: var(--primary-dark);
      border: 1px solid rgba(104, 189, 242, 0.32);
      box-shadow: none;
    }

    .btn.danger {
      background: var(--danger);
      box-shadow: 0 10px 24px rgba(255, 116, 138, 0.22);
    }
    .btn.danger:hover { background: var(--danger-dark); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(104, 189, 242, 0.26);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #a9b8c4;
    }
    .dot.online { background: #57d68d; box-shadow: 0 0 0 4px rgba(87, 214, 141, 0.14); }

    .toolbar {
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .upload-zone {
      padding: 28px;
      margin-bottom: 22px;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .upload-zone.active { display: block; }

    .dropzone {
      border: 2px dashed rgba(104, 189, 242, 0.52);
      border-radius: 22px;
      padding: 34px 18px;
      text-align: center;
      background: rgba(255,255,255,0.52);
      transition: 0.2s ease;
    }

    .dropzone.dragging {
      transform: scale(1.01);
      border-color: var(--primary-strong);
      background: rgba(220, 243, 255, 0.88);
    }

    .dropzone h3 { margin: 0 0 8px; font-size: 22px; }
    .dropzone p { margin: 0 0 18px; color: var(--muted); }

    .hidden-input { display: none; }

    .progress-wrap {
      margin-top: 16px;
      display: none;
    }

    .progress-wrap.show { display: block; }

    .progress-bar {
      height: 12px;
      border-radius: 999px;
      background: rgba(104, 189, 242, 0.18);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #a1dfff);
      transition: width 0.2s ease;
    }

    .progress-text {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px;
    }

    .comic-card {
      overflow: hidden;
      background: var(--card-strong);
      border: 1px solid rgba(104, 189, 242, 0.22);
      border-radius: 22px;
      box-shadow: 0 14px 34px rgba(42, 122, 174, 0.12);
      transition: 0.2s ease;
    }

    .comic-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 42px rgba(42, 122, 174, 0.18);
    }

    .thumb {
      width: 100%;
      height: 250px;
      background: linear-gradient(135deg, #dff2ff, #ffffff);
      display: block;
      object-fit: cover;
      cursor: zoom-in;
    }

    .comic-meta {
      padding: 13px 14px 15px;
    }

    .comic-title {
      margin: 0;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-date {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .card-actions {
      margin-top: 12px;
      display: none;
      gap: 8px;
    }

    .admin-mode .card-actions { display: flex; }

    .small-btn {
      border: 0;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(104, 189, 242, 0.15);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .small-btn.danger { background: rgba(255, 116, 138, 0.16); color: var(--danger-dark); }

    .empty {
      grid-column: 1 / -1;
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.65);
      border: 1px dashed rgba(104, 189, 242, 0.36);
      border-radius: var(--radius);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100% - 36px));
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(31, 58, 77, 0.94);
      color: white;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
      z-index: 30;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: 0.22s ease;
      line-height: 1.55;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(15, 38, 54, 0.68);
      z-index: 20;
    }

    .modal.show { display: grid; }

    .modal-card {
      width: min(960px, 100%);
      max-height: 92vh;
      border-radius: 22px;
      background: white;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(104, 189, 242, 0.22);
    }

    .modal-head strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-body {
      overflow: auto;
      background: #f4fbff;
      text-align: center;
    }

    .modal-body img {
      max-width: 100%;
      height: auto;
      display: inline-block;
      vertical-align: top;
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .intro, .admin-box, .upload-zone { padding: 22px; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .thumb { height: 210px; }
    }
  </style>
</head>
<body>
  <main class="shell" id="app">
    <section class="hero">
      <div class="panel intro">
        <div class="badge">💙 Cloud Comic Gallery</div>
        <h1>梨可可的漫画站</h1>
        <p class="subtitle">这里是漫画图片展示页。读者可以浏览作品；管理员登录后可以上传新漫画，上传完成后所有人刷新网页都能看到。</p>
        <div class="stats">
          <div class="stat">
            <strong id="comicCount">0</strong>
            <span>已发布图片</span>
          </div>
          <div class="stat">
            <strong id="latestDate">—</strong>
            <span>最近更新</span>
          </div>
        </div>
      </div>

      <aside class="panel admin-box">
        <h2>管理员入口</h2>
        <p class="admin-tip">只有指定管理员邮箱可以上传或删除。读者打开网页时只会看到漫画展示区。</p>
        <div class="status-pill"><span class="dot" id="loginDot"></span><span id="loginStatus">未登录</span></div>

        <form id="loginForm">
          <div class="field">
            <label for="email">邮箱</label>
            <input id="email" type="email" autocomplete="email" value="2403981313@qq.com" required />
          </div>
          <div class="field" style="margin-top: 10px;">
            <label for="password">密码</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="输入 Supabase 用户密码" required />
          </div>
          <div class="btn-row" style="margin-top: 14px;">
            <button class="btn" type="submit">登录上传</button>
            <button class="btn ghost" type="button" id="logoutBtn">退出</button>
          </div>
        </form>
      </aside>
    </section>

    <section class="panel upload-zone" id="uploadZone">
      <div class="dropzone" id="dropzone">
        <h3>上传漫画图片</h3>
        <p>把图片拖到这里，或者点击按钮选择文件。支持多张图片。</p>
        <input class="hidden-input" id="fileInput" type="file" accept="image/*" multiple />
        <button class="btn" type="button" id="pickFilesBtn">选择图片</button>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">准备上传…</div>
      </div>
    </section>

    <section class="panel toolbar">
      <input id="searchInput" type="search" placeholder="搜索漫画文件名…" />
      <button class="btn ghost" id="refreshBtn" type="button">刷新列表</button>
      <button class="btn ghost" id="scrollTopBtn" type="button">回到顶部</button>
    </section>

    <section class="gallery" id="gallery" aria-live="polite"></section>

    <footer>Made for Licoco · 图片由 Supabase 云端保存</footer>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="modalTitle">预览</strong>
        <button class="btn ghost" type="button" id="closeModalBtn">关闭</button>
      </div>
      <div class="modal-body">
        <img id="modalImage" alt="漫画预览" />
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = "https://fviztitnwfgnejszmssl.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QhZ98MFvnED8QMZcDmZJCg_XBKmcAOP";
    const ADMIN_EMAIL = "2403981313@qq.com";
    const BUCKET_NAME = "comics";
    const TABLE_NAME = "comics";
    const MAX_FILE_MB = 30;

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = document.querySelector("#app");
    const gallery = document.querySelector("#gallery");
    const comicCount = document.querySelector("#comicCount");
    const latestDate = document.querySelector("#latestDate");
    const loginForm = document.querySelector("#loginForm");
    const emailInput = document.querySelector("#email");
    const passwordInput = document.querySelector("#password");
    const logoutBtn = document.querySelector("#logoutBtn");
    const loginDot = document.querySelector("#loginDot");
    const loginStatus = document.querySelector("#loginStatus");
    const uploadZone = document.querySelector("#uploadZone");
    const dropzone = document.querySelector("#dropzone");
    const fileInput = document.querySelector("#fileInput");
    const pickFilesBtn = document.querySelector("#pickFilesBtn");
    const progressWrap = document.querySelector("#progressWrap");
    const progressFill = document.querySelector("#progressFill");
    const progressText = document.querySelector("#progressText");
    const searchInput = document.querySelector("#searchInput");
    const refreshBtn = document.querySelector("#refreshBtn");
    const scrollTopBtn = document.querySelector("#scrollTopBtn");
    const modal = document.querySelector("#modal");
    const modalImage = document.querySelector("#modalImage");
    const modalTitle = document.querySelector("#modalTitle");
    const closeModalBtn = document.querySelector("#closeModalBtn");
    const toast = document.querySelector("#toast");

    let currentUser = null;
    let comics = [];
    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 3600);
    }

    function formatDate(dateString, mode = "short") {
      if (!dateString) return "—";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "—";
      if (mode === "day") {
        return `${date.getMonth() + 1}/${date.getDate()}`;
      }
      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function sanitizeFileName(name) {
      const fallback = "comic-image";
      const cleaned = (name || fallback)
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9._-]/g, "_")
        .replace(/_+/g, "_")
        .slice(0, 80);
      return cleaned || fallback;
    }

    function isAdmin() {
      return currentUser?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    }

    function updateAdminUI() {
      const admin = isAdmin();
      app.classList.toggle("admin-mode", admin);
      uploadZone.classList.toggle("active", admin);
      loginDot.classList.toggle("online", admin);
      loginStatus.textContent = admin ? `已登录：${currentUser.email}` : "未登录";
      logoutBtn.disabled = !currentUser;
    }

    async function restoreSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        console.warn(error);
        showToast("读取登录状态失败，请稍后重试。");
        return;
      }
      currentUser = data.session?.user || null;
      updateAdminUI();
    }

    async function loadComics() {
      gallery.innerHTML = `<div class="empty">正在加载漫画图片…</div>`;

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("id,title,file_path,public_url,created_at")
        .order("created_at", { ascending: false });

      if (error) {
        gallery.innerHTML = `<div class="empty">读取失败：${error.message}<br>请检查 Supabase 表、RLS policy 和 API key 是否配置完成。</div>`;
        showToast("读取漫画列表失败。可能还没创建 comics 表或权限策略。");
        return;
      }

      comics = data || [];
      renderComics();
    }

    function renderComics() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = comics.filter(comic => {
        const title = (comic.title || "").toLowerCase();
        return title.includes(keyword);
      });

      comicCount.textContent = String(comics.length);
      latestDate.textContent = comics[0]?.created_at ? formatDate(comics[0].created_at, "day") : "—";

      gallery.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = comics.length === 0 ? "还没有漫画图片。管理员登录后上传第一张吧～" : "没有找到匹配的图片。";
        gallery.appendChild(empty);
        return;
      }

      filtered.forEach(comic => {
        const card = document.createElement("article");
        card.className = "comic-card";

        const img = document.createElement("img");
        img.className = "thumb";
        img.src = comic.public_url;
        img.alt = comic.title || "漫画图片";
        img.loading = "lazy";
        img.addEventListener("click", () => openModal(comic));

        const meta = document.createElement("div");
        meta.className = "comic-meta";

        const title = document.createElement("p");
        title.className = "comic-title";
        title.textContent = comic.title || "未命名漫画";

        const date = document.createElement("p");
        date.className = "comic-date";
        date.textContent = `上传于 ${formatDate(comic.created_at)}`;

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const openBtn = document.createElement("button");
        openBtn.className = "small-btn";
        openBtn.type = "button";
        openBtn.textContent = "预览";
        openBtn.addEventListener("click", () => openModal(comic));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "small-btn danger";
        deleteBtn.type = "button";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", () => deleteComic(comic));

        actions.append(openBtn, deleteBtn);
        meta.append(title, date, actions);
        card.append(img, meta);
        gallery.appendChild(card);
      });
    }

    function openModal(comic) {
      modalTitle.textContent = comic.title || "漫画预览";
      modalImage.src = comic.public_url;
      modalImage.alt = comic.title || "漫画预览";
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
      modalImage.removeAttribute("src");
    }

    async function uploadFiles(fileList) {
      if (!isAdmin()) {
        showToast("请先用管理员账号登录，再上传漫画图片。");
        return;
      }

      const files = Array.from(fileList || []).filter(file => file.type.startsWith("image/"));
      if (files.length === 0) {
        showToast("请选择图片文件。\n支持 jpg、png、webp、gif 等图片格式。");
        return;
      }

      progressWrap.classList.add("show");
      progressFill.style.width = "0%";
      progressText.textContent = `准备上传 ${files.length} 张图片…`;

      let uploadedCount = 0;
      let failedCount = 0;

      for (const file of files) {
        const sizeMb = file.size / 1024 / 1024;
        if (sizeMb > MAX_FILE_MB) {
          failedCount++;
          showToast(`${file.name} 太大啦，单张图片建议小于 ${MAX_FILE_MB}MB。`);
          continue;
        }

        const safeName = sanitizeFileName(file.name);
        const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const day = new Date().toISOString().slice(0, 10);
        const filePath = `uploads/${day}/${Date.now()}-${id}-${safeName}`;

        progressText.textContent = `正在上传：${file.name}`;

        const { error: uploadError } = await supabaseClient.storage
          .from(BUCKET_NAME)
          .upload(filePath, file, {
            cacheControl: "3600",
            upsert: false,
            contentType: file.type
          });

        if (uploadError) {
          failedCount++;
          console.error(uploadError);
          showToast(`上传失败：${file.name}\n${uploadError.message}`);
          continue;
        }

        const { data: publicUrlData } = supabaseClient.storage
          .from(BUCKET_NAME)
          .getPublicUrl(filePath);

        const { error: insertError } = await supabaseClient
          .from(TABLE_NAME)
          .insert({
            title: file.name,
            file_path: filePath,
            public_url: publicUrlData.publicUrl
          });

        if (insertError) {
          failedCount++;
          console.error(insertError);
          showToast(`图片已上传，但记录保存失败：${file.name}\n${insertError.message}`);
          continue;
        }

        uploadedCount++;
        const percent = Math.round((uploadedCount + failedCount) / files.length * 100);
        progressFill.style.width = `${percent}%`;
        progressText.textContent = `已处理 ${uploadedCount + failedCount}/${files.length} 张`;
      }

      fileInput.value = "";
      progressFill.style.width = "100%";
      progressText.textContent = `完成：成功 ${uploadedCount} 张，失败 ${failedCount} 张`;
      showToast(`上传完成：成功 ${uploadedCount} 张，失败 ${failedCount} 张。`);
      await loadComics();
    }

    async function deleteComic(comic) {
      if (!isAdmin()) {
        showToast("只有管理员可以删除图片。白嫖删除按钮是不行的噢。🫧");
        return;
      }

      const ok = confirm(`确定删除「${comic.title || "这张图片"}」吗？\n删除后读者也看不到了。`);
      if (!ok) return;

      const { error: storageError } = await supabaseClient.storage
        .from(BUCKET_NAME)
        .remove([comic.file_path]);

      if (storageError) {
        console.error(storageError);
        showToast("删除云端图片失败：" + storageError.message);
        return;
      }

      const { error: deleteError } = await supabaseClient
        .from(TABLE_NAME)
        .delete()
        .eq("id", comic.id);

      if (deleteError) {
        console.error(deleteError);
        showToast("删除数据库记录失败：" + deleteError.message);
        return;
      }

      showToast("已删除。干干净净，像雨后蓝天。☁️");
      await loadComics();
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        showToast("登录失败：" + error.message);
        return;
      }

      currentUser = data.user || null;
      if (!isAdmin()) {
        await supabaseClient.auth.signOut();
        currentUser = null;
        updateAdminUI();
        showToast("这个账号不是管理员账号，已自动退出。请使用指定管理员邮箱。");
        return;
      }

      passwordInput.value = "";
      updateAdminUI();
      showToast("登录成功！现在可以上传漫画图片啦。💙");
    });

    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      currentUser = null;
      updateAdminUI();
      showToast("已退出管理员模式。");
    });

    pickFilesBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (event) => uploadFiles(event.target.files));

    ["dragenter", "dragover"].forEach(eventName => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("dragging");
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("dragging");
      });
    });

    dropzone.addEventListener("drop", (event) => {
      uploadFiles(event.dataTransfer.files);
    });

    searchInput.addEventListener("input", renderComics);
    refreshBtn.addEventListener("click", loadComics);
    scrollTopBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    closeModalBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    supabaseClient.auth.onAuthStateChange((_event, session) => {
      currentUser = session?.user || null;
      updateAdminUI();
    });

    (async function init() {
      await restoreSession();
      await loadComics();
    })();
  </script>
</body>
</html>
