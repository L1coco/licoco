<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>充电特典 - 梨可可的漫画站</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #fff0fb;
      --card: rgba(255, 255, 255, 0.86);
      --card-strong: rgba(255, 255, 255, 0.97);
      --text: #4b244f;
      --muted: #927091;
      --primary: #d66fff;
      --primary-strong: #b94deb;
      --primary-dark: #8433b0;
      --pink: #ff8bc9;
      --pink-dark: #d95599;
      --line: rgba(214, 111, 255, 0.28);
      --danger: #ff668d;
      --danger-dark: #d9416d;
      --shadow: 0 20px 56px rgba(143, 57, 178, 0.16);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 8%, rgba(255, 139, 201, 0.48), transparent 28rem),
        radial-gradient(circle at 90% 10%, rgba(214, 111, 255, 0.42), transparent 30rem),
        linear-gradient(135deg, #fff8fd 0%, var(--bg) 50%, #f6e9ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(176, 87, 206, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(176, 87, 206, 0.08) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 72%);
    }

    .shell {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 48px;
      position: relative;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 34px;
      margin-bottom: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "♡";
      position: absolute;
      right: 28px;
      bottom: -28px;
      color: rgba(214, 111, 255, 0.14);
      font-size: 132px;
      line-height: 1;
      font-weight: 900;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 139, 201, 0.22);
      color: var(--pink-dark);
      font-size: 13px;
      font-weight: 850;
      border: 1px solid rgba(255, 139, 201, 0.34);
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.04;
    }

    .subtitle {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 17px;
    }

    input, button {
      font: inherit;
    }

    input[type="password"], input[type="text"], input[type="number"] {
      width: 100%;
      border: 1px solid rgba(214, 111, 255, 0.34);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.78);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(214, 111, 255, 0.14);
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      color: white;
      font-weight: 850;
      box-shadow: 0 10px 24px rgba(185, 77, 235, 0.2);
      transition: 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover { transform: translateY(-1px); filter: saturate(1.05); }
    .btn:disabled { opacity: 0.52; cursor: not-allowed; transform: none; }

    .btn.ghost {
      background: rgba(255,255,255,0.76);
      color: var(--primary-dark);
      border: 1px solid rgba(214, 111, 255, 0.32);
      box-shadow: none;
    }

    .btn.danger {
      background: var(--danger);
      box-shadow: 0 10px 24px rgba(255, 102, 141, 0.2);
    }
    .btn.danger:hover { background: var(--danger-dark); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .gate {
      padding: 26px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .gate.hide { display: none; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .admin-tools {
      padding: 24px;
      margin-bottom: 20px;
      display: none;
    }

    .admin-mode .admin-tools { display: block; }

    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .tool-box {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(214, 111, 255, 0.18);
    }

    .tool-box h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .status-text {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .status-text.strong {
      color: var(--primary-dark);
      font-weight: 800;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 10px;
      margin-bottom: 12px;
    }

    .hidden-input { display: none; }

    .progress-wrap {
      margin-top: 14px;
      display: none;
    }

    .progress-wrap.show { display: block; }

    .progress-bar {
      height: 12px;
      border-radius: 999px;
      background: rgba(214, 111, 255, 0.14);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--pink));
      transition: width 0.2s ease;
    }

    .progress-text {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      display: none;
    }

    .content.show { display: block; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .fan-card {
      overflow: hidden;
      border-radius: 22px;
      background: var(--card-strong);
      border: 1px solid rgba(214, 111, 255, 0.2);
      box-shadow: 0 14px 34px rgba(143, 57, 178, 0.12);
    }

    .thumb {
      width: 100%;
      height: 260px;
      display: block;
      object-fit: cover;
      background: linear-gradient(135deg, #ffe1f3, #f0d9ff);
      cursor: zoom-in;
    }

    .meta {
      padding: 13px 14px 15px;
    }

    .title {
      margin: 0;
      font-weight: 850;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .date {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .card-actions {
      margin-top: 12px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
    }

    .admin-mode .card-actions { display: flex; }

    .small-btn {
      border: 0;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(214, 111, 255, 0.14);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 850;
    }

    .small-btn.danger { background: rgba(255, 102, 141, 0.16); color: var(--danger-dark); }

    .empty {
      grid-column: 1 / -1;
      padding: 46px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.66);
      border: 1px dashed rgba(214, 111, 255, 0.34);
      border-radius: var(--radius);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(62, 25, 75, 0.7);
      z-index: 20;
    }

    .modal.show { display: grid; }

    .modal-card {
      width: min(960px, 100%);
      max-height: 92vh;
      border-radius: 22px;
      background: white;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(214, 111, 255, 0.22);
    }

    .modal-body {
      overflow: auto;
      background: #fff5fd;
      text-align: center;
    }

    .modal-body img {
      max-width: 100%;
      height: auto;
      display: inline-block;
      vertical-align: top;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100% - 36px));
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(75, 36, 79, 0.94);
      color: white;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
      z-index: 30;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: 0.22s ease;
      line-height: 1.55;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .hero, .gate, .admin-tools { padding: 22px; }
      .gate, .tool-grid, .form-row { grid-template-columns: 1fr; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .thumb { height: 220px; }
    }
  </style>
</head>
<body>
  <main class="shell" id="app">
    <div class="top-actions">

    function nextFrame() {
      return new Promise(resolve => {
        const timerId = setTimeout(resolve, 80);
        requestAnimationFrame(() => {
          clearTimeout(timerId);
          resolve();
        });
      });
    }

    function withTimeout(promise, timeoutMs, label) {
      let timerId;
      const timeout = new Promise((_, reject) => {
        timerId = setTimeout(() => {
          reject(new Error(`${label}超时，可能是网络、Supabase 权限或表结构还没有配置好。`));
        }, timeoutMs);
      });

      return Promise.race([promise, timeout]).finally(() => clearTimeout(timerId));
    }

    function errorMessage(error) {
      return error?.message || String(error || "未知错误");
    }

    function sha256Hex(value) {
      const bytes = new TextEncoder().encode(value);
      const words = [];
      const k = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ];
      const h = [
        0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
        0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
      ];

      for (let i = 0; i < bytes.length; i++) {
        words[i >> 2] |= bytes[i] << (24 - (i % 4) * 8);
      }
      words[bytes.length >> 2] |= 0x80 << (24 - (bytes.length % 4) * 8);
      words[(((bytes.length + 8) >> 6) << 4) + 15] = bytes.length * 8;

      const rightRotate = (number, shift) => (number >>> shift) | (number << (32 - shift));
      const w = new Array(64);

      for (let i = 0; i < words.length; i += 16) {
        let [a, b, c, d, e, f, g, hash] = h;

        for (let j = 0; j < 64; j++) {
          if (j < 16) {
            w[j] = words[i + j] | 0;
          } else {
            const gamma0 = rightRotate(w[j - 15], 7) ^ rightRotate(w[j - 15], 18) ^ (w[j - 15] >>> 3);
            const gamma1 = rightRotate(w[j - 2], 17) ^ rightRotate(w[j - 2], 19) ^ (w[j - 2] >>> 10);
            w[j] = (w[j - 16] + gamma0 + w[j - 7] + gamma1) | 0;
          }

          const ch = (e & f) ^ (~e & g);
          const maj = (a & b) ^ (a & c) ^ (b & c);
          const sigma0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
          const sigma1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
          const t1 = (hash + sigma1 + ch + k[j] + w[j]) | 0;
          const t2 = (sigma0 + maj) | 0;

          hash = g;
          g = f;
          f = e;
          e = (d + t1) | 0;
          d = c;
          c = b;
          b = a;
          a = (t1 + t2) | 0;
        }

        h[0] = (h[0] + a) | 0;
        h[1] = (h[1] + b) | 0;
        h[2] = (h[2] + c) | 0;
        h[3] = (h[3] + d) | 0;
        h[4] = (h[4] + e) | 0;
        h[5] = (h[5] + f) | 0;
        h[6] = (h[6] + g) | 0;
        h[7] = (h[7] + hash) | 0;
      }

      return h.map(item => (item >>> 0).toString(16).padStart(8, "0")).join("");
    }

    function isAdmin() {
      return currentUser?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    }

    function formatDate(dateString) {
      if (!dateString) return "—";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function sanitizeFileName(name) {
      const fallback = "fan-special";
      const cleaned = (name || fallback)
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9._-]/g, "_")
        .replace(/_+/g, "_")
        .slice(0, 80);
      return cleaned || fallback;
    }

    function getNextSortOrder() {
      const orders = fanImages.map(item => Number(item.sort_order)).filter(Number.isFinite);
      return orders.length === 0 ? 10 : Math.max(...orders) + 10;
    }

    function unlockPage() {
      gateForm.classList.add("hide");
      content.classList.add("show");
      window.location.hash = "specials";
    }

    function updateAdminUI() {
      const admin = isAdmin();
      app.classList.toggle("admin-mode", admin);
      adminLoginLink.style.display = admin ? "none" : "inline-flex";
      if (admin) {
        unlockPage();
      }
    }

    async function restoreSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        console.warn(error);
        return;
      }
      currentUser = data.session?.user || null;
      if (currentUser && !isAdmin()) {
        await supabaseClient.auth.signOut();
        currentUser = null;
      }
      updateAdminUI();
    }

    async function loadFanImages() {
      gallery.innerHTML = `<div class="empty">正在加载充电特典…</div>`;

      let data;
      let error;

      try {
        if (isAdmin()) {
          const result = await withTimeout(
            supabaseClient
              .from(TABLE_NAME)
              .select("id,title,file_path,public_url,sort_order,created_at")
              .order("sort_order", { ascending: true })
              .order("created_at", { ascending: false }),
            REQUEST_TIMEOUT_MS,
            "读取特典图片"
          );
          data = result.data;
          error = result.error;
        } else {
          const result = await withTimeout(
            supabaseClient.rpc("get_fan_images", {
              access_password: fanPassword
            }),
            REQUEST_TIMEOUT_MS,
            "读取特典图片"
          );
          data = result.data;
          error = result.error;
        }
      } catch (requestError) {
        console.error(requestError);
        gallery.innerHTML = `<div class="empty">读取失败：${errorMessage(requestError)}<br>请检查网络、Supabase 表和 RLS 策略。</div>`;
        return;
      }

      if (error) {
        console.error(error);
        gallery.innerHTML = `<div class="empty">读取失败：${error.message}<br>请确认已经运行新版 Supabase SQL。</div>`;
        return;
      }

      fanImages = data || [];
      renderFanImages();
    }

    function renderFanImages() {
      gallery.innerHTML = "";

      if (fanImages.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = isAdmin() ? "还没有特典图片。上传第一张吧。" : "这里暂时还没有特典图片。";
        gallery.appendChild(empty);
        return;
      }

      fanImages.forEach(item => {
        const card = document.createElement("article");
        card.className = "fan-card";

        const img = document.createElement("img");
        img.className = "thumb";
        img.src = item.public_url;
        img.alt = item.title || "充电特典图片";
        img.loading = "lazy";
        img.addEventListener("click", () => openModal(item));

        const meta = document.createElement("div");
        meta.className = "meta";

        const title = document.createElement("p");
        title.className = "title";
        title.textContent = item.title || "未命名特典";

        const date = document.createElement("p");
        date.className = "date";
        date.textContent = `上传于 ${formatDate(item.created_at)}`;

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const previewBtn = document.createElement("button");
        previewBtn.className = "small-btn";
        previewBtn.type = "button";
        previewBtn.textContent = "预览";
        previewBtn.addEventListener("click", () => openModal(item));

        const editBtn = document.createElement("button");
        editBtn.className = "small-btn";
        editBtn.type = "button";
        editBtn.textContent = "编辑";
        editBtn.addEventListener("click", () => editFanImage(item));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "small-btn danger";
        deleteBtn.type = "button";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", () => deleteFanImage(item));

        actions.append(previewBtn, editBtn, deleteBtn);
        meta.append(title, date, actions);
        card.append(img, meta);
        gallery.appendChild(card);
      });
    }

    function openModal(item) {
      modalTitle.textContent = item.title || "充电特典预览";
      modalImage.src = item.public_url;
      modalImage.alt = item.title || "充电特典预览";
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
      modalImage.removeAttribute("src");
    }

    async function updateFanImage(item, patch) {
      if (!isAdmin()) {
        showToast("只有管理员可以修改特典图片。");
        return false;
      }

      let error;
      try {
        const result = await withTimeout(
          supabaseClient
            .from(TABLE_NAME)
            .update(patch)
            .eq("id", item.id),
          REQUEST_TIMEOUT_MS,
          "保存图片信息"
        );
        error = result.error;
      } catch (requestError) {
        error = requestError;
      }

      if (error) {
        console.error(error);
        showToast("保存失败：" + errorMessage(error));
        return false;
      }

      return true;
    }

    async function editFanImage(item) {
      const title = prompt("图片标题", item.title || "");
      if (title === null) return;

      const orderInput = prompt("排序号（数字越小越靠前）", String(item.sort_order ?? getNextSortOrder()));
      if (orderInput === null) return;

      const sortOrder = Number.parseInt(orderInput, 10);
      if (!Number.isFinite(sortOrder)) {
        showToast("排序号需要填写数字。");
        return;
      }

      const ok = await updateFanImage(item, {
        title: title.trim() || item.title || "未命名特典",
        sort_order: sortOrder
      });

      if (ok) {
        showToast("特典信息已保存。");
        await loadFanImages();
      }
    }

    async function deleteFanImage(item) {
      if (!isAdmin()) {
        showToast("只有管理员可以删除特典图片。");
        return;
      }

      const ok = confirm(`确定删除「${item.title || "这张特典图片"}」吗？`);
      if (!ok) return;

      let storageError;
      try {
        const storageResult = await withTimeout(
          supabaseClient.storage
            .from(BUCKET_NAME)
            .remove([item.file_path]),
          REQUEST_TIMEOUT_MS,
          "删除云端图片"
        );
        storageError = storageResult.error;
      } catch (requestError) {
        storageError = requestError;
      }

      if (storageError) {
        console.error(storageError);
        showToast("删除云端图片失败：" + errorMessage(storageError));
        return;
      }

      let deleteError;
      try {
        const deleteResult = await withTimeout(
          supabaseClient
            .from(TABLE_NAME)
            .delete()
            .eq("id", item.id),
          REQUEST_TIMEOUT_MS,
          "删除数据库记录"
        );
        deleteError = deleteResult.error;
      } catch (requestError) {
        deleteError = requestError;
      }

      if (deleteError) {
        console.error(deleteError);
        showToast("删除数据库记录失败：" + errorMessage(deleteError));
        return;
      }

      showToast("已删除特典图片。");
      await loadFanImages();
    }

    async function uploadFiles(fileList) {
      if (!isAdmin()) {
        showAdminFeedback("请先用管理员账号登录。");
        return;
      }

      const files = Array.from(fileList || []).filter(file => file.type.startsWith("image/"));
      if (files.length === 0) {
        showAdminFeedback("请选择图片文件。");
        return;
      }

      progressWrap.classList.add("show");
      progressFill.style.width = "0%";
      progressText.textContent = `准备上传 ${files.length} 张图片…`;
      showAdminFeedback(`准备上传 ${files.length} 张特典图片…`, true);
      await nextFrame();

      let nextSortOrder = Number.parseInt(uploadOrder.value, 10);
      if (!Number.isFinite(nextSortOrder)) {
        nextSortOrder = getNextSortOrder();
      }

      let uploadedCount = 0;
      let failedCount = 0;

      for (const file of files) {
        const sizeMb = file.size / 1024 / 1024;
        if (sizeMb > MAX_FILE_MB) {
          failedCount++;
          showAdminFeedback(`${file.name} 太大啦，单张图片建议小于 ${MAX_FILE_MB}MB。`);
          continue;
        }

        const safeName = sanitizeFileName(file.name);
        const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const day = new Date().toISOString().slice(0, 10);
        const filePath = `fan-specials/${day}/${Date.now()}-${id}-${safeName}`;

        progressText.textContent = `正在上传：${file.name}`;
        showAdminFeedback(`正在上传到 Supabase Storage：${file.name}`, true);
        await nextFrame();

        let uploadError;
        try {
          const uploadResult = await withTimeout(
            supabaseClient.storage
              .from(BUCKET_NAME)
              .upload(filePath, file, {
                cacheControl: "3600",
                upsert: false,
                contentType: file.type
              }),
            UPLOAD_TIMEOUT_MS,
            "上传图片"
          );
          uploadError = uploadResult.error;
        } catch (requestError) {
          uploadError = requestError;
        }

        if (uploadError) {
          failedCount++;
          console.error(uploadError);
          showAdminFeedback(`上传到 Storage 失败：${file.name}\n${errorMessage(uploadError)}`);
          continue;
        }

        const { data: publicUrlData } = supabaseClient.storage
          .from(BUCKET_NAME)
          .getPublicUrl(filePath);

        const customTitle = uploadTitle.value.trim();
        progressText.textContent = `正在保存数据库记录：${file.name}`;
        showAdminFeedback(`图片已上传，正在保存数据库记录：${file.name}`, true);
        await nextFrame();

        let insertError;
        try {
          const insertResult = await withTimeout(
            supabaseClient
              .from(TABLE_NAME)
              .insert({
                title: customTitle ? `${customTitle} ${uploadedCount + 1}` : file.name,
                file_path: filePath,
                public_url: publicUrlData.publicUrl,
                sort_order: nextSortOrder
              }),
            REQUEST_TIMEOUT_MS,
            "保存图片记录"
          );
          insertError = insertResult.error;
        } catch (requestError) {
          insertError = requestError;
        }

        if (insertError) {
          failedCount++;
          console.error(insertError);
          showAdminFeedback(`图片已上传，但数据库记录保存失败：${file.name}\n${errorMessage(insertError)}\n请确认已重新运行新版 supabase-setup.sql。`);
          continue;
        }

        uploadedCount++;
        nextSortOrder += 10;
        const percent = Math.round((uploadedCount + failedCount) / files.length * 100);
        progressFill.style.width = `${percent}%`;
        progressText.textContent = `已处理 ${uploadedCount + failedCount}/${files.length} 张`;
      }

      fileInput.value = "";
      uploadOrder.value = String(nextSortOrder);
      progressFill.style.width = "100%";
      progressText.textContent = `完成：成功 ${uploadedCount} 张，失败 ${failedCount} 张`;
      showAdminFeedback(`上传完成：成功 ${uploadedCount} 张，失败 ${failedCount} 张。`, failedCount === 0);
      await loadFanImages();
    }

    gateForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      enterBtn.disabled = true;
      enterBtn.textContent = "正在校验…";

      try {
        await nextFrame();
        fanPassword = sha256Hex(fanPasswordInput.value);

        const { data, error } = await withTimeout(
          supabaseClient.rpc("verify_fan_password", {
            access_password: fanPassword
          }),
          REQUEST_TIMEOUT_MS,
          "校验访问密码"
        );

        if (error) {
          console.error(error);
          showToast("校验失败：" + errorMessage(error));
          return;
        }

        if (!data) {
          showToast("密码不正确，或者管理员还没有设置密码。");
          return;
        }

        unlockPage();
        showToast("欢迎进入充电特典页。");
        await loadFanImages();
      } catch (requestError) {
        console.error(requestError);
        showToast("校验失败：" + errorMessage(requestError));
      } finally {
        enterBtn.disabled = false;
        enterBtn.textContent = "进入特典页";
      }
    });

    passwordForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const submitButton = passwordForm.querySelector("button[type='submit']");
      if (!isAdmin()) {
        showAdminFeedback("请先用管理员账号登录。");
        return;
      }

      if (newFanPassword.value.length < 4) {
        showAdminFeedback("密码至少需要 4 位。");
        return;
      }

      submitButton.disabled = true;

      try {
        showAdminFeedback("正在生成密码校验信息…", true);
        await nextFrame();
        const passwordHash = sha256Hex(newFanPassword.value);

        showAdminFeedback("正在保存访问密码到 Supabase…", true);
        await nextFrame();

        const { error } = await withTimeout(
          supabaseClient.rpc("set_fan_password", {
            new_password: passwordHash
          }),
          REQUEST_TIMEOUT_MS,
          "保存访问密码"
        );

        if (error) {
          console.error(error);
          showAdminFeedback("保存密码失败：" + errorMessage(error) + "\n请确认已重新运行新版 supabase-setup.sql。");
          return;
        }

        newFanPassword.value = "";
        showAdminFeedback("充电粉丝访问密码已更新。现在可以用这个密码进入特典页。", true);
      } catch (requestError) {
        console.error(requestError);
        showAdminFeedback("保存密码失败：" + errorMessage(requestError) + "\n如果是超时，请检查网络和 Supabase 的 fan_settings / set_fan_password 是否已创建。");
      } finally {
        submitButton.disabled = false;
      }
    });

    pickFilesBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", event => uploadFiles(event.target.files));
    closeModalBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", event => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();
    });

    supabaseClient.auth.onAuthStateChange(async (_event, session) => {
      currentUser = session?.user || null;
      if (currentUser && !isAdmin()) {
        await supabaseClient.auth.signOut();
        currentUser = null;
      }
      updateAdminUI();
      if (isAdmin()) {
        showAdminFeedback("管理员已登录，可以设置密码和上传特典图片。", true);
        await loadFanImages();
      }
    });

    (async function init() {
      await restoreSession();
      if (isAdmin()) {
        showAdminFeedback("管理员已登录，可以设置密码和上传特典图片。", true);
        await loadFanImages();
      }
    })();
  </script>
</body>
</html>
